<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global User Map (Autocomplete)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#eef1f4}
header{padding:14px 18px;background:#111;color:#fff;font-size:20px;font-weight:700}
.wrap{display:grid;grid-template-columns:380px 1fr;height:calc(100vh - 52px)}
.panel{background:#fff;padding:14px;overflow:auto;border-right:1px solid #ddd}
#map{height:100%;width:100%}
input,button{width:100%;padding:10px;margin-top:8px;box-sizing:border-box;border-radius:10px;font-size:14px}
input{border:1px solid #ccc}
button{border:none;background:#d33;color:#fff;font-weight:700;cursor:pointer}
button:disabled{opacity:.5}
.card{border:1px solid #ddd;border-radius:12px;padding:10px;margin-top:10px;background:#fafafa}
.small{font-size:12px;color:#666}
.suggest-box{position:relative}
.suggestions{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ccc;border-radius:8px;z-index:999;max-height:180px;overflow:auto}
.suggestions div{padding:8px;cursor:pointer}
.suggestions div:hover{background:#eee}
#status{margin-top:8px;min-height:18px}
</style>
</head>
<body>
<header>Global User Map (Autocomplete)</header>
<div class="wrap">
<div class="panel">
<h3>ユーザー登録</h3>
<input id="name" placeholder="名前">

<div class="suggest-box">
<input id="home" placeholder="住んでいる場所（都市/住所/日本語OK）">
<div id="homeSug" class="suggestions"></div>
</div>

<div class="suggest-box">
<input id="freq" placeholder="よくいる場所">
<div id="freqSug" class="suggestions"></div>
</div>

<div class="suggest-box">
<input id="origin" placeholder="出身地">
<div id="originSug" class="suggestions"></div>
</div>

<button onclick="addUser()">追加</button>
<button onclick="clearAll()">全削除</button>

<div id="status" class="small">世界中検索対応（Nominatim + Photon）。入力すると候補が出ます。</div>
<div id="list"></div>
</div>
<div id="map"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map=L.map('map').setView([20,0],2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(map);

let users=JSON.parse(localStorage.getItem('globalUsers')||'[]');
let layers=[];

function debounce(fn,delay){let t;return(...args)=>{clearTimeout(t);t=setTimeout(()=>fn(...args),delay)}}

async function search(q){
 if(!q) return [];
 const url=`https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=5&q=${encodeURIComponent(q)}`;
 try{
  const r=await fetch(url);
  return await r.json();
 }catch(e){return []}
}

function setupAuto(inputId,sugId){
 const input=document.getElementById(inputId);
 const box=document.getElementById(sugId);
 
 const run=debounce(async()=>{
  const q=input.value;
  const res=await search(q);
  box.innerHTML='';
  res.forEach(r=>{
   const div=document.createElement('div');
   div.textContent=r.display_name;
   div.onclick=()=>{
    input.value=r.display_name;
    box.innerHTML='';
   };
   box.appendChild(div);
  });
 },300);
 
 input.addEventListener('input',run);
}

setupAuto('home','homeSug');
setupAuto('freq','freqSug');
setupAuto('origin','originSug');

async function geocode(q){
 const url=`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(q)}`;
 const r=await fetch(url);
 const d=await r.json();
 if(!d.length) throw new Error('not found');
 return {
  lat:+d[0].lat,
  lng:+d[0].lon,
  label:d[0].display_name
 };
}

function draw(){
 layers.forEach(l=>map.removeLayer(l));layers=[];
 const bounds=[];
 users.forEach(u=>{
  const pts=[];
  ['home','freq','origin'].forEach(t=>{
   const p=u[t];
   const m=L.circleMarker([p.lat,p.lng],{radius:7}).addTo(map);
   layers.push(m);
   pts.push([p.lat,p.lng]);
   bounds.push([p.lat,p.lng]);
  });
  layers.push(L.polyline(pts).addTo(map));
 });
 if(bounds.length) map.fitBounds(bounds);
 render();
}

function render(){
 const list=document.getElementById('list');
 list.innerHTML='';
 users.forEach((u,i)=>{
  const d=document.createElement('div');
  d.className='card';
  d.innerHTML=`<b>${u.name}</b><br>${u.home.label}<br>${u.freq.label}<br>${u.origin.label}<br><button onclick="removeUser(${i})">削除</button>`;
  list.appendChild(d);
 });
}

async function addUser(){
 const name=document.getElementById('name').value.trim();
 const home=document.getElementById('home').value;
 const freq=document.getElementById('freq').value;
 const origin=document.getElementById('origin').value;
 if(!name||!home||!freq||!origin){alert('全部入力');return}
 setStatus('検索中...');setButtons(true);
 try{
  const [h,f,o]=await Promise.all([geocode(home),geocode(freq),geocode(origin)]);
  users.push({name,home:h,freq:f,origin:o});
  localStorage.setItem('globalUsers',JSON.stringify(users));
  draw();
 }catch(e){setStatus('検索失敗')}
 setButtons(false);
}

function removeUser(i){users.splice(i,1);localStorage.setItem('globalUsers',JSON.stringify(users));draw();}
function clearAll(){users=[];localStorage.removeItem('globalUsers');draw();}
function setButtons(b){document.querySelectorAll('button').forEach(x=>x.disabled=b)}
function setStatus(t){document.getElementById('status').textContent=t}

draw();
</script>
</body>
</html>
