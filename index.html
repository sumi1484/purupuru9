<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Administrative Map v4</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#eef1f4}
header{padding:14px 18px;background:#111;color:#fff;font-size:20px;font-weight:700}
.wrap{display:grid;grid-template-columns:420px 1fr;height:calc(100vh - 52px)}
.panel{background:#fff;padding:14px;overflow:auto;border-right:1px solid #ddd}
#map{height:100%;width:100%}
input,select,button{width:100%;padding:10px;margin-top:8px;box-sizing:border-box;border-radius:10px;font-size:14px}
input,select{border:1px solid #ccc}
button{border:none;background:#d33;color:#fff;font-weight:700;cursor:pointer}
button:disabled{opacity:.5}
.card{border:1px solid #ddd;border-radius:12px;padding:10px;margin-top:10px;background:#fafafa}
.small{font-size:12px;color:#666}
.suggest{position:relative}
.sugbox{position:absolute;background:#fff;border:1px solid #ccc;border-radius:8px;z-index:999;max-height:200px;overflow:auto;width:100%}
.sugbox div{padding:6px;cursor:pointer}
.sugbox div:hover{background:#eee}
#status{margin-top:8px;min-height:18px}
</style>
</head>
<body>
<header>Global Administrative Map v4 (Full Countries + Geo Search)</header>
<div class="wrap">
<div class="panel">
<h3>ユーザー登録</h3>
<input id="name" placeholder="名前">

<label class="small">国（全世界）</label>
<select id="country"></select>

<div class="suggest">
<input id="home" placeholder="住んでいる場所（都市・行政区）">
<div id="homeSug" class="sugbox"></div>
</div>

<div class="suggest">
<input id="freq" placeholder="よくいる場所">
<div id="freqSug" class="sugbox"></div>
</div>

<div class="suggest">
<input id="origin" placeholder="出身地">
<div id="originSug" class="sugbox"></div>
</div>

<button onclick="addUser()">追加</button>
<button onclick="clearAll()">全削除</button>

<div id="status" class="small">国リストはREST Countries APIで全取得。地名は世界フル検索。</div>
<div id="list"></div>
</div>
<div id="map"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map=L.map('map').setView([20,0],2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(map);

let users=JSON.parse(localStorage.getItem('v4users')||'[]');
let layers=[];
let countries=[];

async function loadCountries(){
 const r=await fetch('https://restcountries.com/v3.1/all');
 const d=await r.json();
 countries=d.map(c=>({name:c.name.common,code:c.cca2})).sort((a,b)=>a.name.localeCompare(b.name));
 const sel=document.getElementById('country');
 countries.forEach(c=>{
  const o=document.createElement('option');o.value=c.name;o.textContent=c.name;sel.appendChild(o);
 });
}

function debounce(fn,t){let x;return(...a)=>{clearTimeout(x);x=setTimeout(()=>fn(...a),t)}}

async function search(q){
 if(!q) return [];
 const url=`https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=5&q=${encodeURIComponent(q)}`;
 try{const r=await fetch(url);return await r.json();}catch(e){return []}
}

function attach(inputId,boxId){
 const i=document.getElementById(inputId);
 const b=document.getElementById(boxId);
 const run=debounce(async()=>{
  const res=await search(i.value);
  b.innerHTML='';
  res.forEach(x=>{
   const d=document.createElement('div');
   d.textContent=x.display_name;
   d.onclick=()=>{i.value=x.display_name;b.innerHTML=''};
   b.appendChild(d);
  });
 },300);
 i.addEventListener('input',run);
}

attach('home','homeSug');
attach('freq','freqSug');
attach('origin','originSug');

async function geocode(q){
 const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(q)}`);
 const d=await r.json();
 if(!d.length) throw new Error('not found');
 return {lat:+d[0].lat,lng:+d[0].lon,label:d[0].display_name};
}

function draw(){
 layers.forEach(l=>map.removeLayer(l));layers=[];
 const bounds=[];
 users.forEach(u=>{
  const pts=[];
  ['home','freq','origin'].forEach(t=>{
   const p=u[t];
   const m=L.circleMarker([p.lat,p.lng],{radius:7}).addTo(map);
   layers.push(m);
   pts.push([p.lat,p.lng]);
   bounds.push([p.lat,p.lng]);
  });
  layers.push(L.polyline(pts).addTo(map));
 });
 if(bounds.length) map.fitBounds(bounds);
 render();
}

function render(){
 const list=document.getElementById('list');list.innerHTML='';
 users.forEach((u,i)=>{
  const d=document.createElement('div');
  d.className='card';
  d.innerHTML=`<b>${u.name}</b><br>${u.country}<br>${u.home.label}<br>${u.freq.label}<br>${u.origin.label}<br><button onclick="removeUser(${i})">削除</button>`;
  list.appendChild(d);
 });
}

async function addUser(){
 const name=nameEl.value.trim();
 const country=document.getElementById('country').value;
 const home=homeEl.value.trim();
 const freq=freqEl.value.trim();
 const origin=originEl.value.trim();
 if(!name||!home||!freq||!origin){setStatus('必須項目不足');return}
 setButtons(true);setStatus('世界検索中...');
 try{
  const [h,f,o]=await Promise.all([
   geocode(home+","+country),
   geocode(freq+","+country),
   geocode(origin+","+country)
  ]);
  users.push({name,country,home:h,freq:f,origin:o});
  localStorage.setItem('v4users',JSON.stringify(users));
  draw();
  setStatus('追加完了');
 }catch(e){setStatus('検索失敗')}
 setButtons(false);
}

function removeUser(i){users.splice(i,1);localStorage.setItem('v4users',JSON.stringify(users));draw();}
function clearAll(){users=[];localStorage.removeItem('v4users');draw();}
function setButtons(b){document.querySelectorAll('button').forEach(x=>x.disabled=b)}
function setStatus(t){document.getElementById('status').textContent=t}

const nameEl=document.getElementById('name');
const homeEl=document.getElementById('home');
const freqEl=document.getElementById('freq');
const originEl=document.getElementById('origin');

loadCountries();draw();
</script>
</body>
</html>
