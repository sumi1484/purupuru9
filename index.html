<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Admin Map v5</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;font-family:sans-serif;background:#eef1f4}
header{padding:12px 16px;background:#111;color:#fff;font-weight:700}
.wrap{display:grid;grid-template-columns:420px 1fr;height:calc(100vh - 48px)}
.panel{background:#fff;padding:14px;overflow:auto;border-right:1px solid #ddd}
#map{height:100%}
input,button{width:100%;padding:10px;margin-top:8px;border-radius:10px;font-size:14px}
input{border:1px solid #ccc}
button{border:none;background:#d33;color:#fff;font-weight:700;cursor:pointer}
.card{padding:10px;border:1px solid #ddd;margin-top:10px;border-radius:10px;background:#fafafa}
.sug{position:absolute;background:#fff;border:1px solid #ccc;width:100%;z-index:999;max-height:200px;overflow:auto}
.sug div{padding:6px;cursor:pointer}
.sug div:hover{background:#eee}
.wrap2{position:relative}
.small{font-size:12px;color:#666}
</style>

</head>
<body>

<header>Global Administrative Map v5</header>

<div class="wrap">

<div class="panel">

<input id="name" placeholder="名前">

<div class="wrap2">
<input id="home" placeholder="住んでいる場所">
<div id="homeSug" class="sug"></div>
</div>

<div class="wrap2">
<input id="freq" placeholder="よくいる場所">
<div id="freqSug" class="sug"></div>
</div>

<div class="wrap2">
<input id="origin" placeholder="出身地">
<div id="originSug" class="sug"></div>
</div>

<button onclick="addUser()">追加</button>

<div class="small">世界中検索 + 行政区フィルタ付き</div>

<div id="list"></div>

</div>

<div id="map"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map=L.map('map').setView([20,0],2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(map);

let users=JSON.parse(localStorage.getItem('v5')||'[]');
let layers=[];

const ALLOWED=["city","town","village","administrative","municipality","county","state"];

function debounce(f,d){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>f(...a),d)}}

async function search(q){
 if(!q) return [];
 const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=6&q=${encodeURIComponent(q)}`);
 return await r.json();
}

function attach(id,sid){
 const i=document.getElementById(id);
 const box=document.getElementById(sid);

 const run=debounce(async()=>{
  const res=await search(i.value);
  box.innerHTML="";

  res.forEach(r=>{
   const t=(r.type||r.addresstype||"").toLowerCase();

   if(!ALLOWED.includes(t)) return;

   const d=document.createElement("div");
   d.textContent=r.display_name;

   d.onclick=()=>{
    i.value=r.display_name;
    box.innerHTML="";
   };

   box.appendChild(d);
  });

 },250);

 i.addEventListener("input",run);
}

attach("home","homeSug");
attach("freq","freqSug");
attach("origin","originSug");

async function geo(q){
 const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(q)}`);
 const d=await r.json();
 if(!d.length) throw "not found";
 return {lat:+d[0].lat,lng:+d[0].lon,label:d[0].display_name};
}

function draw(){
 layers.forEach(l=>map.removeLayer(l));
 layers=[];

 const b=[];

 users.forEach(u=>{
  const pts=[];

  ["home","freq","origin"].forEach(k=>{
   const p=u[k];
   const m=L.circleMarker([p.lat,p.lng],{radius:7}).addTo(map);
   layers.push(m);
   pts.push([p.lat,p.lng]);
   b.push([p.lat,p.lng]);
  });

  layers.push(L.polyline(pts).addTo(map));
 });

 if(b.length) map.fitBounds(b);
 render();
}

function render(){
 const el=document.getElementById("list");
 el.innerHTML="";

 users.forEach(u=>{
  const d=document.createElement("div");
  d.className="card";
  d.innerHTML=`<b>${u.name}</b><br>${u.home.label}<br>${u.freq.label}<br>${u.origin.label}`;
  el.appendChild(d);
 });
}

async function addUser(){
 const name=nameEl.value.trim();
 const home=homeEl.value;
 const freq=freqEl.value;
 const origin=originEl.value;

 if(!name||!home||!freq||!origin) return;

 const [h,f,o]=await Promise.all([
  geo(home),
  geo(freq),
  geo(origin)
 ]);

 users.push({name,home:h,freq:f,origin:o});
 localStorage.setItem("v5",JSON.stringify(users));
 draw();
}

const nameEl=document.getElementById("name");
const homeEl=document.getElementById("home");
const freqEl=document.getElementById("freq");
const originEl=document.getElementById("origin");

draw();
</script>

</body>
</html>
